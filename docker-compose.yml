services:

  postgres:
    image: postgres:17
    container_name: hrmate-db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - hrmate-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hrmate-network

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: hrmate-migrator
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hrmate-network
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: hrmate-backend
    env_file:
      - .env
    ports:
      - "${HTTP_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - hrmate-network

networks:
  hrmate-network:
    name: hrmate-network
    driver: bridge

volumes:
  hrmate-data:
    name: hrmate-data