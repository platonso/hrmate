services:

  postgres:
    image: postgres:17
    container_name: hrmate-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - hrmate-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hrmate-network

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: postgres-port-forwarder
    command: "tcp-listen:5432,fork,reuseaddr tcp-connect:postgres:5432"
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - hrmate-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres-migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: hrmate-migrator
    environment:
      MIGRATION_DIR: ${MIGRATION_DIR}

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hrmate-network
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: hrmate-backend
    environment:
      HTTP_PORT: ${HTTP_PORT}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - "${HTTP_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrator:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - hrmate-network

networks:
  hrmate-network:
    name: hrmate-network
    driver: bridge

volumes:
  hrmate-data:
    name: hrmate-data